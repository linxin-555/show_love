# show-love nginx config
# sudo cp nginx.conf /etc/nginx/sites-available/show-love
# sudo ln -s /etc/nginx/sites-available/show-love /etc/nginx/sites-enabled/
# sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    server_name lovenl.site www.lovenl.site;

    client_max_body_size 25m;

    location /uploads/ {
        alias /opt/show_love/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
